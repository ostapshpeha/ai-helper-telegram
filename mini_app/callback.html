<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Запит на передзвін</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
<div class="page">
  <div class="page-title">Запит на передзвін</div>
  <div class="page-subtitle">Заповніть форму — ми зателефонуємо вам найближчим часом</div>

  <div class="form-group">
    <label class="form-label">Ваше ім'я (необов'язково)</label>
    <input id="name" class="form-input" type="text" placeholder="Іван Петренко" autocomplete="name">
  </div>

  <div class="form-group">
    <label class="form-label">Номер телефону <span style="color:red">*</span></label>
    <input id="phone" class="form-input" type="tel" placeholder="+380 XX XXX XX XX"
           inputmode="tel" autocomplete="tel">
  </div>

  <div class="form-group">
    <label class="form-label">Модель автомобіля</label>
    <select id="car_model" class="form-select">
      <option value="">Оберіть модель…</option>
      <optgroup label="Honda">
        <option>Honda City</option>
        <option>Honda Civic</option>
        <option>Honda Accord</option>
        <option>Honda CR-V</option>
        <option>Honda HR-V</option>
        <option>Honda ZR-V</option>
        <option>Honda Pilot</option>
        <option>Honda Jazz</option>
      </optgroup>
      <optgroup label="Acura">
        <option>Acura ILX</option>
        <option>Acura TLX</option>
        <option>Acura RDX</option>
        <option>Acura MDX</option>
      </optgroup>
      <option value="Інша">Інша</option>
    </select>
  </div>

  <div class="form-group">
    <label class="form-label">Причина звернення</label>
    <textarea id="issue" class="form-textarea"
              placeholder="Опишіть проблему або питання…"></textarea>
  </div>

  <div id="error" style="color:red;font-size:13px;margin-bottom:12px;display:none"></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();
tg.BackButton.show();
tg.BackButton.onClick(() => tg.close());

const params = new URLSearchParams(location.search);
if (params.get('issue')) document.getElementById('issue').value = params.get('issue');

function validate() {
  const phone = document.getElementById('phone').value.trim();
  return phone.length >= 10;
}

function updateMainBtn() {
  if (validate()) {
    tg.MainButton.enable();
    tg.MainButton.setParams({ color: tg.themeParams.button_color || '#2481cc' });
  } else {
    tg.MainButton.disable();
    tg.MainButton.setParams({ color: '#aaa' });
  }
}

tg.MainButton.setText('Надіслати запит');
tg.MainButton.show();
tg.MainButton.disable();

document.getElementById('phone').addEventListener('input', updateMainBtn);

tg.MainButton.onClick(async () => {
  const phone = document.getElementById('phone').value.trim();
  if (!validate()) return;

  tg.MainButton.showProgress();

  const payload = {
    name: document.getElementById('name').value.trim(),
    phone,
    car_model: document.getElementById('car_model').value,
    issue: document.getElementById('issue').value.trim(),
  };

  try {
    const r = await fetch('/api/callback', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Telegram-Init-Data': tg.initData,
      },
      body: JSON.stringify(payload),
    });

    if (!r.ok) throw new Error('server error');

    tg.MainButton.hideProgress();
    tg.showPopup({
      title: 'Запит надіслано!',
      message: 'Ми зателефонуємо вам найближчим часом.',
      buttons: [{ type: 'ok' }],
    }, () => tg.close());

  } catch {
    tg.MainButton.hideProgress();
    const err = document.getElementById('error');
    err.textContent = 'Помилка відправки. Спробуйте ще раз.';
    err.style.display = 'block';
  }
});
</script>
</body>
</html>
